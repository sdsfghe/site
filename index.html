            width: 10px;
            height: 10px;
            background-color: #00d2ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);

            position: relative;
            z-index: 1;
        }

            color: #ff1e1e;

            border-radius: 12px; 
            color: #fff; 
            margin-bottom: 25px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box;

            font-weight: bold;

            text-transform: uppercase;

        }
