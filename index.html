<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factions Check | Ultimate</title>
    <style>
        body { 
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 45px 45px; 
            color: #fff; 
            font-family: 'Consolas', 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            cursor: none; 
        }

        #cursor {
            width: 12px;
            height: 12px;
            background-color: #00d2ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff;
            transition: transform 0.06s ease-out;
        }

        .container { 
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 50px; 
            border-radius: 20px; 
            width: 550px; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        h1 { 
            color: #ff1e1e; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 35px; 
            text-shadow: 0 0 15px rgba(255, 30, 30, 0.4); 
        }

        textarea { 
            width: 100%; 
            height: 200px; 
            padding: 15px; 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid rgba(255, 30, 30, 0.2); 
            border-radius: 10px; 
            color: #fff; 
            margin-bottom: 25px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(90deg, #990000, #ff1e1e); 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s;
            cursor: none;
        }

        #result { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            color: #ff4d4d; 
            background: rgba(255, 0, 0, 0.05); 
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
