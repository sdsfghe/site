<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRUTHX Roblox</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: radial-gradient(circle at top,#1e293b,#020617);
color:white;
text-align:center;
}

/* üst bar */

header{
padding:30px;
font-size:32px;
font-weight:bold;
letter-spacing:3px;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* logo */

.logo{
margin-top:60px;
}

.logo img{
width:140px;
border-radius:20px;
box-shadow:0 0 30px #ff6a00;
}

/* başlık */

h1{
margin-top:20px;
font-size:48px;
background:linear-gradient(90deg,#ff6a00,#ff2d55);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* açıklama */

p{
margin-top:20px;
font-size:20px;
opacity:0.8;
}

/* neon buton */

.button{
display:inline-block;
margin-top:40px;
padding:20px 60px;
font-size:24px;
border-radius:14px;
text-decoration:none;
color:white;
background:#22c55e;

box-shadow:
0 0 10px #22c55e,
0 0 20px #22c55e,
0 0 40px #16a34a,
0 0 80px #16a34a;

transition:0.3s;
animation:glow 2.5s infinite alternate;
}

.button:hover{
transform:scale(1.1);

box-shadow:
0 0 20px #39ff14,
0 0 40px #39ff14,
0 0 80px #39ff14,
0 0 120px #39ff14;
}

@keyframes glow{
from{
box-shadow:
0 0 10px #22c55e,
0 0 20px #22c55e,
0 0 40px #16a34a;
}

to{
box-shadow:
0 0 20px #4ade80,
0 0 40px #4ade80,
0 0 80px #22c55e;
}
}

/* kartlar */

.cards{
margin-top:100px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:#0f172a;
padding:30px;
width:220px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #ff6a00;
}

footer{
margin-top:100px;
padding:30px;
opacity:0.6;
}

</style>

</head>

<body>

<header>

JOIN GAME
</a>

<div class="cards">

<div class="card">
<h3>🎮 Roblox</h3>
<p>Sunucumuzda Roblox oyunları oynanır.</p>
</div>

</body>
</html>
