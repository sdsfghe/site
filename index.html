p {

/* Neon ışıklı buton stili */

a.button:hover {
  transform: scale(1.05);
  box-shadow:
    0 0 10px #39ff14,
    0 0 20px #39ff14,
    0 0 40px #39ff14,
    0 0 80px #39ff14,
    0 0 90px #39ff14;
}

/* Neon ışık animasyonu */
@keyframes neonGlow {
  0% {
    box-shadow:
      0 0 5px #22c55e,
      0 0 10px #22c55e,
      0 0 20px #22c55e,
      0 0 40px #16a34a,
      0 0 80px #16a34a;
  }
  100% {
    box-shadow:
      0 0 10px #4ade80,
      0 0 20px #4ade80,
